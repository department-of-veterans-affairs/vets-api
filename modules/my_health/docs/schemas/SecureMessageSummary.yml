type: object
required:
  - type
  - id
  - attributes
  - links
properties:
  type:
    type: string
    example: "messages"
  id:
    type: string
    example: "123789"
  attributes:
    type: object
    required:
      - messageId
      - category
      - subject
      - body
      - attachment
      - sentDate
      - senderId
      - senderName
      - recipientId
      - recipientName
      - readReceipt
    properties:
      messageId:
        type: integer
        example: 123789
      category:
        type: string
        enum: [OTHER, COVID, APPOINTMENTS, MEDICATIONS, TEST_RESULTS, EDUCATION]
        example: MEDICATIONS
      subject:
        type: string
        example: Medication Inquiry
      body:
        type: string
        nullable: true
        example: 2
      attachment:
        type: boolean
        example: false
      sentDate:
        type: string
        example: 2017-09-01T16:09:56.000Z
      senderId:
        type: integer
        example: 541200
      senderName:
        type: string
        example: "DOE, JANE"
      recipientId:
        type: integer
        example: 399955
      recipientName:
        type: string
        example: "ROE, RICHARD"
      readReceipt:
        type: string
        nullable: true
        enum: [READ, null]
      triageGroupName:
        type: string
        nullable: true
        example: "Triage_Group_5"
      triageGroup:
        type: object
        nullable: true
        description: Embedded triage group (provider recipient) details from the MHV Secure Messaging API
        properties:
          triageTeamId:
            type: integer
            example: 401155
          name:
            type: string
            example: "SM_TO_VA_GOV_TRIAGE_GROUP_TEST"
          preferredTeam:
            type: boolean
            example: false
          active:
            type: boolean
            example: true
          stationNumber:
            type: string
            nullable: true
            example: "979"
          healthCareSystemName:
            type: string
            nullable: true
          locationName:
            type: string
            nullable: true
          locationStationNumber:
            type: string
            nullable: true
          groupTypeEnumVal:
            type: string
            nullable: true
          subGroupTypeEnumVal:
            type: string
            nullable: true
          groupTypePatientDisplay:
            type: string
            nullable: true
          subGroupTypePatientDisplay:
            type: string
            nullable: true
          teamName:
            type: string
            nullable: true
          leadProviderName:
            type: string
            nullable: true
          suggestedNameDisplay:
            type: string
            nullable: true
          description:
            type: string
            nullable: true
          legacyName:
            type: string
            nullable: true
          ohPoolId:
            type: string
            nullable: true
          oplock:
            type: integer
            example: 1
          createdDate:
            type: string
            nullable: true
            example: "Mon, 20 Mar 2023 14:01:45 GMT"
          modifiedDate:
            type: string
            nullable: true
            example: "Thu, 15 Jan 2026 15:49:06 GMT"
          relationType:
            type: string
            nullable: true
            example: "PATIENT"
          ohTriageGroup:
            type: boolean
            example: false
      proxySenderName:
        type: string
        nullable: true
        example: "SMITH, JOHN"
      suggestedNameDisplay:
        type: string
        example: "Robert J. Dole VA Medical And Regional Office Center | Pharmacy | Ask a pharmacist | SLC10 - Madison, James"
      isOhMessage:
        type: boolean
        description: Indicates if this message is an Oracle Health message
        example: false
      ohMigrationPhase:
        type: string
        nullable: true
        description: The Oracle Health migration phase for the facility associated with this message (p0-p7 or null)
        example: null
      migratedToOracleHealth:
        type: boolean
        description: Indicates if the message relates to a post-migration Oracle Health state. True when the triage group's facility is Cerner in the veteran's VA profile but the triage group is a VistA triage group.
        example: false
  links:
    type: object
    required:
      - self
    properties:
      self:
        type: string
        example: https://api.va.gov/my_health/v1/messaging/messages/123789
