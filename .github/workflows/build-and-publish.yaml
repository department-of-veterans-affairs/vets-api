name: build-and-publish
run-name: Build And Publish
on: [push]
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      BUNDLE_ENTERPRISE__CONTRIBSYS__COM: ${{ secrets.BUNDLE_ENTERPRISE__CONTRIBSYS__COM }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4.1.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0 # needed to get enough tag history to determine the semver
      - name: Setup Environment
        run: echo "VETS_API_USER_ID=$(id -u)" >> $GITHUB_ENV
      - name: Git Version
        id: version
        uses: codacy/git-version@2.7.1
        with:
          release-branch: master
      - name: Echo the version
        run: |
          echo ${{ steps.version.outputs.version }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-gov-west-1
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2.0.1
        with:
          mask-password: true
      - name: Build Docker Image
        uses: docker/build-push-action@v4
        with:
          build-args: |
            BUNDLE_ENTERPRISE__CONTRIBSYS__COM=${{ env.BUNDLE_ENTERPRISE__CONTRIBSYS__COM }}
            USER_ID=${{ env.VETS_API_USER_ID }}
            RAILS_ENV=production
          context: .
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/dsva/vets-api-image:${{ steps.version.outputs.version }}
