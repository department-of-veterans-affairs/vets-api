name: Delete Datadog service from Datadog
on:
  push:
    branches:
      - master
    paths:
      - "datadog-service-catalog/**.yml"
  pull_request:
    types:
      - opened
    branches:
      - master
    paths:
      - "datadog-service-catalog/**.yml"

jobs:
  get_deleted_services:
    name: 'Get deleted service filenames'
    runs-on: ubuntu-latest
    outputs:
      files: ${{steps.one.outputs.files}}
    steps:
      - name: 'Checkout repo'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: one
        name: 'Check for deleted DataDog service files'
        run: |
          arr=$(jq -ncR '[inputs]' <<< $(git diff --diff-filter=D --name-only ${{ github.event.pull_request.base.sha || github.event.before }}...${{ github.sha }} -- "datadog-service-catalog/**.yml"))
          out=$(echo $arr | jq '.[] | select(. !="datadog-service-catalog/datadog-service-catalog.yml") | [.]')
          echo $out
          echo "files=$out" >> $GITHUB_OUTPUT

  delete_services:
    name: 'Delete services from Datadog'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs:
      - get_deleted_services
    strategy:
      matrix:
        file: ${{fromJSON(needs.get_deleted_services.outputs.files)}}
    steps:
      - name: 'Checkout master branch'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master
          token: ${{github.token}}
      - name: 'Get service name from file'
        id: parse_service_name
        uses: mikefarah/yq@master
        with:
          cmd: yq -o=json '.dd-service' ${{matrix.file}}
      - name: 'Get schema version from file'
        id: parse_schema_version
        uses: mikefarah/yq@master
        with:
          cmd: yq -o=json '.schema-version' ${{matrix.file}}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ASSUME_ROLE }}
          aws-region: us-gov-west-1
      - name: Get DD API Key
        uses: department-of-veterans-affairs/action-inject-ssm-secrets@d8e6de3bde4dd728c9d732baef58b3c854b8c4bb
        with:
          ssm_parameter: /dsva-vagov/vets-api/prod/env_vars/DD_API_KEY
          env_variable_name: DD_API_KEY
      - name: Get DD App Key
        uses: department-of-veterans-affairs/action-inject-ssm-secrets@d8e6de3bde4dd728c9d732baef58b3c854b8c4bb
        with:
          ssm_parameter: /dsva-vagov/vets-api/prod/env_vars/DD_APP_KEY
          env_variable_name: DD_APP_KEY
      - name: 'Delete service'
        run: |
              service=${{steps.parse_service_name.outputs.result}}
              schema=${{steps.parse_schema_version.outputs.result}}
              echo "Deleting $service@$schema from Datadog Service Catalog"
              curl --location --request DELETE 'https://api.ddog-gov.com/api/v2/services/definitions/$service?schema_version=$schema' \
              --header 'Accept: application/json' \
              --header 'DD-API-KEY: ${{ env.DD_API_KEY }}' \
              --header 'DD-APPLICATION-KEY: ${{ env.DD_APP_KEY }}' \
