type: object
required:
  - recipient_id
  - category
  - body
properties:
  recipient_id:
    type: integer
    description: |
      The message recipient. This must be a valid recipient id that is assigned to the user. The list of valid
      recipients for a user can be obtained from the <pre>/v1/messaging/recipients</pre> endpoint.
    example: 1763526
  category:
    type: string
    description: |
      Message category. This must be one of the values returned by the
      <pre>/v1/messaging/messages/categories</pre> endpoint.
    example: "OTHER"
  body:
    type: string
    example: "Please renew my prescription for Lisinopril 10mg."
  subject:
    type: string
    example: "Prescription renewal request"
  draft_id:
    type: integer
    description: |
      Specifies draft message ID to send. Draft message is deleted once sent. Note that the
      recipient_id, category, body, and subject included with this post will overwrite any of
      original values of the draft.
  station_number:
    type: string
    description: |
      Optional. The station number (facility ID) associated with the recipient's triage group.
      Used for analytics tracking of Oracle Health facility messages. If not provided, facility
      tracking is skipped.
    example: "989"
  prescription_id:
    type: string
    description: |
      The prescription identifier for the renewal request. Optional — if omitted or blank,
      a warning is logged and the request is passed through to the upstream endpoint without it.
    example: "24654491"
