kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: vets-website-ingress
spec:
  rules:
    - host: "test4web.vagov-next-prblack-cluster.vfs.va.gov"
      http:
        paths:
          - path: /
            backend:
              service:
                name: vets-website-s3-service
                port:
                  name: http
            pathType: Prefix
    - host: "test4content.vagov-next-prblack-cluster.vfs.va.gov"
      http:
        paths:
          - path: /
            backend:
              service:
                name: content-s3-service
                port:
                  name: http
            pathType: Prefix