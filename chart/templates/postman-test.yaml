{{- $root := . -}}
apiVersion: v1
kind: Pod
metadata:
  name: "vets-api-postman-test"
  annotations:
    {{- range $key, $value := $root.Values.postman.annotations }}
      {{ $key }}: {{ $value }}
    {{- end }}
spec:
  containers:
    - name: postman
      image: "{{ $root.Values.image.testRepository }}:{{ $root.Values.image.tag }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      env:
        - name: "API_URL"
          value: "{{ $root.Values.domain }}"
  restartPolicy: Never