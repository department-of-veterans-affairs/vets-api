type: object
nullable: true
description: Embedded triage group (provider recipient) details from the MHV Secure Messaging API
properties:
  triageTeamId:
    type: integer
    example: 401155
  name:
    type: string
    example: "SM_TO_VA_GOV_TRIAGE_GROUP_TEST"
  preferredTeam:
    type: boolean
    example: false
  active:
    type: boolean
    example: true
  stationNumber:
    type: string
    nullable: true
    example: "979"
  healthCareSystemName:
    type: string
    nullable: true
  locationName:
    type: string
    nullable: true
  locationStationNumber:
    type: string
    nullable: true
  groupTypeEnumVal:
    type: string
    nullable: true
  subGroupTypeEnumVal:
    type: string
    nullable: true
  groupTypePatientDisplay:
    type: string
    nullable: true
  subGroupTypePatientDisplay:
    type: string
    nullable: true
  teamName:
    type: string
    nullable: true
  leadProviderName:
    type: string
    nullable: true
  suggestedNameDisplay:
    type: string
    nullable: true
  description:
    type: string
    nullable: true
  legacyName:
    type: string
    nullable: true
  ohPoolId:
    type: string
    nullable: true
  oplock:
    type: integer
    example: 1
  createdDate:
    type: string
    nullable: true
    example: "Mon, 20 Mar 2023 14:01:45 GMT"
  modifiedDate:
    type: string
    nullable: true
    example: "Thu, 15 Jan 2026 15:49:06 GMT"
  relationType:
    type: string
    nullable: true
    example: "PATIENT"
  ohTriageGroup:
    type: boolean
    example: false
