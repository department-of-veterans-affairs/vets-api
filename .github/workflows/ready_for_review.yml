name: Pull Request Ready for Review
on:
  pull_request:
     types: [labeled, unlabeled]

jobs:
  ready_for_review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: check
        run: |
          if [ ${{ contains(github.event.pull_request.labels.*.name, 'audit-service-failure') }} ]; then
            READY_FOR_REVIEW=false
          elif [ ${{ contains(github.event.pull_request.labels.*.name, 'code-health-failure') }} ]; then
            READY_FOR_REVIEW=false
          elif [ ${{ contains(github.event.pull_request.labels.*.name, 'codeowners-addition-failure') }} ]; then
            READY_FOR_REVIEW=false
          elif [ ${{ contains(github.event.pull_request.labels.*.name, 'codeowners-delete-failure') }} ]; then
            READY_FOR_REVIEW=false
          elif [ ${{ contains(github.event.pull_request.labels.*.name, 'lint-failure') }} ]; then
            READY_FOR_REVIEW=false
          elif [ ${{ contains(github.event.pull_request.labels.*.name, 'test-failure') }} ]; then
            READY_FOR_REVIEW=false
          else
            READY_FOR_REVIEW=true
          fi
          echo "READY_FOR_REVIEW=$READY_FOR_REVIEW" >> $GITHUB_ENV

      - name: Add Review label
        uses: actions-ecosystem/action-add-labels@v1
        if: env.READY_FOR_REVIEW != 'false'
        with:
          fail_on_error: true
          number: ${{ github.event.pull_request.number }}
          labels: |
            ready-for-backend-review

      - name: Remove Review label
        uses: actions-ecosystem/action-remove-labels@v1
        if: env.READY_FOR_REVIEW == 'false'
        with:
          number: ${{ github.event.pull_request.number }}
          labels: |
            ready-for-backend-review